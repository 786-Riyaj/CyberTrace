 <html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
	<main style="background-color: #020617; min-height: 100vh; padding: 30px;">
		
		<style>
			:root {
				--cyber-primary: #22c55e;
				--cyber-danger: #ef4444;
				--page-bg: #020617;
				--card-bg: #0f172a;
				--text-main: #e5e7eb;
				--text-muted: #94a3b8;
			}

			.custom-panel {
				background: var(--card-bg);
				border: 1px solid rgba(255, 255, 255, 0.05);
				border-radius: 12px;
				overflow: hidden;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
			}

			.panel-header {
				background: rgba(34, 197, 94, 0.05);
				border-bottom: 2px solid var(--cyber-primary);
				padding: 20px;
			}

			.panel-header h4 {
				color: var(--cyber-primary);
				font-weight: 700;
				margin: 0;
				text-transform: uppercase;
				letter-spacing: 1.5px;
			}

			/* --- High-Visibility Table --- */
			.custom-table { color: var(--text-main) !important; }
			
			.custom-table thead th {
				background: #16213e;
				color: var(--cyber-primary);
				padding: 15px;
				font-weight: 600;
				font-size: 0.8rem;
				border: none;
				text-transform: uppercase;
				white-space: nowrap;
			}

			.custom-table tbody td {
				border-bottom: 1px solid rgba(255, 255, 255, 0.03);
				padding: 12px 10px;
				vertical-align: middle;
				color: var(--text-muted);
				font-size: 0.85rem;
				text-align: center;
			}

			.highlight-text {
				color: var(--text-main);
				font-weight: 600;
			}

			/* --- Status Badge (Cyber Red for Rejection) --- */
			.badge-rejected {
				background: rgba(239, 68, 68, 0.1);
				color: var(--cyber-danger);
				border: 1px solid var(--cyber-danger);
				padding: 5px 12px;
				font-weight: 600;
				font-size: 0.75rem;
			}

			/* --- Action Button --- */
			.btn-view-cyber {
				background: transparent;
				color: var(--cyber-primary) !important;
				border: 1px solid var(--cyber-primary);
				font-weight: 500;
				padding: 5px 12px;
				border-radius: 6px;
				transition: 0.3s;
			}

			.btn-view-cyber:hover {
				background: var(--cyber-primary);
				color: #020617 !important;
			}

			/* --- Modal Styling --- */
			.modal-content {
				background: var(--card-bg);
				color: var(--text-main);
				border: 1px solid var(--cyber-primary);
				border-radius: 12px;
			}
			.modal-header { border-bottom: 1px solid rgba(255,255,255,0.05); }

			/* --- Fixed Width Toast --- */
			#custom-toast {
				position: fixed; top: 85px; right: 25px;
				background: var(--card-bg); 
				border-left: 5px solid var(--cyber-primary);
				color: var(--text-main); 
				padding: 20px; 
				border-radius: 8px;
				box-shadow: 0 15px 50px rgba(0,0,0,0.8);
				display: none; z-index: 10000; width: 350px;
				max-width: 90vw; word-wrap: break-word;
				animation: slideIn 0.4s ease-out;
			}
			@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
		</style>

		<div class="container-fluid">
			<div class="row">
				<div class="col-12">
					<div class="custom-panel shadow">
						<div class="panel-header text-center">
							<h4><i class="fas fa-archive me-2"></i> Reject Complaints Log</h4>
						</div>

						<div class="card-body p-0">
							<div class="table-responsive">
								<table class="table custom-table">
									<thead>
										<tr>
											<th>#</th>
											<th>Complaint ID</th>
											<th>Investigator</th>
											<th>Victim Name</th>
											<th>Contact</th>
											<th>Scammer</th>
											<th>Subject</th>
											<th>Scam Type</th>
											<th>Status</th>
											<th>Date</th>
											<th>Evidence</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="com, srno : ${complaints}">
											<td th:text="${srno.index+1}" class="text-white"></td>
											<td class="highlight-text" th:text="${com.complaintId}"></td>
											<td>
												<span th:if="${com.assignedTo != null}" class="text-info fw-bold small">
													<i class="fas fa-user-shield me-1"></i> <span th:text="${com.assignedTo.name}"></span>
												</span>
												<span th:unless="${com.assignedTo != null}" class="text-muted small">Unassigned</span>
											</td>
											<td class="highlight-text" th:text="${com.name}"></td>
											<td th:text="${com.contactNo}"></td>
											<td class="text-danger fw-bold" th:text="${com.scammer}"></td>
											<td th:text="${com.title}"></td>
											<td th:text="${com.typeOfScam}"></td>
											<td>
												<span class="badge badge-rejected rounded-pill" th:text="${com.status}"></span>
											</td>
											<td class="small" th:text="${#temporals.format(com.regDateTime, 'dd MMM yyyy')}"></td>
											<td>
												<button class="btn btn-view-cyber btn-sm" data-bs-toggle="modal" th:data-bs-target="${'#evidenceModal__' + com.id}">
													<i class="fas fa-images"></i> View
												</button>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div th:each="com : ${complaints}" class="modal fade" th:id="${'evidenceModal__' + com.id}" tabindex="-1">
			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title"><i class="fas fa-folder-open text-success me-2"></i> Evidence Repository</h5>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<div class="row g-3">
							<div class="col-sm-4" th:each="images : ${com.evidence}">
								<div class="border border-secondary p-1 rounded bg-black">
									<img class="w-100 rounded" alt="Evidence" th:src="@{'/uploads/' + ${images}}" style="height: 160px; object-fit: cover;">
								</div>
							</div>
						</div>
						<div th:if="${#lists.isEmpty(com.evidence)}" class="text-center p-4">
							<p class="text-muted">No evidence files available.</p>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="custom-toast">
			<div class="d-flex align-items-start">
				<i class="fas fa-check-circle text-success fs-3 me-3 mt-1"></i>
				<div style="flex: 1;">
					<h6 class="m-0 fw-bold text-success">System Update</h6>
					<div id="toast-text" class="small mt-1" style="color: var(--text-main);"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			var msg = /*[[${msg}]]*/ "";
			if (msg && msg.trim() !== "" && msg !== "null") {
				var toast = document.getElementById('custom-toast');
				document.getElementById('toast-text').innerText = msg;
				toast.style.display = 'block';
				setTimeout(function() {
					toast.style.opacity = '0';
					toast.style.transition = '0.8s ease';
					setTimeout(function() { toast.style.display = 'none'; }, 800);
				}, 4500);
			}
		</script>
	</main>
</body>
</html>
