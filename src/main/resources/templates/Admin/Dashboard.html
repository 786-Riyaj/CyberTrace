<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<head>
    <title>Admin Command Center</title>
</head>
<body>
    <main style="background-color: #020617; min-height: 100vh; padding: 25px; color: #f8fafc;">
        
        <style>
            :root {
                --cyber-green: #22c55e;
                --cyber-blue: #3b82f6;
                --cyber-orange: #f59e0b;
                --cyber-red: #ef4444;
                --cyber-purple: #a855f7;
                --panel-bg: #0f172a;
                --border-light: rgba(255, 255, 255, 0.1);
                --text-bright: #ffffff;
                --text-sub: #cbd5e1;
            }

            /* --- Header Panel --- */
            .header-panel {
                background: #0f172a;
                border: 1px solid var(--cyber-green);
                border-left: 6px solid var(--cyber-green);
                border-radius: 12px;
                padding: 25px;
                margin-bottom: 30px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            }

            /* --- Stat Card Styling (Investigator Style) --- */
            .stat-card-adv {
                background: #0f172a;
                border-radius: 15px;
                padding: 25px;
                text-align: center;
                transition: all 0.3s ease;
                border: 1px solid var(--border-light);
                height: 100%;
            }

            .stat-card-adv:hover {
                transform: translateY(-10px);
            }

            .stat-icon {
                font-size: 2.2rem;
                margin-bottom: 12px;
                display: inline-block;
            }

            /* Color Specific Glow & Borders */
            .border-blue { border-bottom: 4px solid var(--cyber-blue); }
            .border-blue:hover { border-color: var(--cyber-blue); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2); }
            
            .border-green { border-bottom: 4px solid var(--cyber-green); }
            .border-green:hover { border-color: var(--cyber-green); box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2); }
            
            .border-purple { border-bottom: 4px solid var(--cyber-purple); }
            .border-purple:hover { border-color: var(--cyber-purple); box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2); }

            .border-orange { border-bottom: 4px solid var(--cyber-orange); }
            .border-orange:hover { border-color: var(--cyber-orange); box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2); }

            .border-red { border-bottom: 4px solid var(--cyber-red); }
            .border-red:hover { border-color: var(--cyber-red); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2); }

            .stat-label-adv {
                color: var(--text-sub);
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                display: block;
                margin-bottom: 5px;
            }

            .stat-number-adv {
                font-size: 2.2rem;
                font-weight: 800;
                color: #ffffff;
                display: block;
            }

            /* Chart & Enquiries Panel */
            .content-panel {
                background: #1e293b;
                border-radius: 12px;
                padding: 20px;
                border: 1px solid var(--border-light);
            }

            .enquiry-item {
                background: rgba(255,255,255,0.03);
                border-radius: 8px;
                padding: 12px;
                margin-bottom: 10px;
                border: 1px solid rgba(255,255,255,0.05);
            }
        </style>

        <div class="header-panel">
            <div class="row align-items-center">
                <div class="col-sm-8">
                    <h2 class="text-white mb-1 fw-bold">Admin <span style="color: var(--cyber-green)">Dashboard</span></h2>
                    <p class="text-sub m-0">Welcome back, <strong class="text-white" th:text="${session.loggedInAdmin.name}">User</strong>. System monitoring active.</p>
                </div>
                <div class="col-sm-4 text-sm-end">
                <div class="d-inline-block text-end me-3 align-middle">
                        <div class="text-bright fw-bold" th:text="${session.loggedInAdmin.email}">admin@email.com</div>
                        <span class="badge bg-success small">Security Level: High</span>
                    </div>
                    <img class="rounded-circle border border-2 border-success" style="width:65px; height:65px; object-fit: cover;" 
                         th:src="@{${session.loggedInAdmin.profilePic != null ? '/Profile/' + session.loggedInAdmin.profilePic : '../assets/images/user/avatar-2.jpg'}}">
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card-adv border-blue">
                    <i class="ti ti-users-group stat-icon" style="color: var(--cyber-blue)"></i>
                    <span class="stat-label-adv">Investigators</span>
                    <span class="stat-number-adv" th:text="${totalInvestigators}">0</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card-adv border-green">
                    <i class="ti ti-file-analytics stat-icon" style="color: var(--cyber-green)"></i>
                    <span class="stat-label-adv">Total Complaints</span>
                    <span class="stat-number-adv" th:text="${totalComplaints}">0</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card-adv border-purple">
                    <i class="ti ti-help-hexagon stat-icon" style="color: var(--cyber-purple)"></i>
                    <span class="stat-label-adv">Enquiries</span>
                    <span class="stat-number-adv" th:text="${totalEnquiries}">0</span>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-3">
                <div class="stat-card-adv border-orange">
                    <span class="stat-label-adv text-warning">Pending</span>
                    <span class="stat-number-adv" th:text="${processingComplaints}">0</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card-adv border-red">
                    <span class="stat-label-adv text-danger">Rejected</span>
                    <span class="stat-number-adv" th:text="${rejectComplaints}">0</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card-adv border-blue">
                    <span class="stat-label-adv text-primary">In-Progress</span>
                    <span class="stat-number-adv" th:text="${processingComplaints}">0</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card-adv border-green">
                    <span class="stat-label-adv text-success">Resolved</span>
                    <span class="stat-number-adv" th:text="${resolvedComplaints}">0</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="content-panel p-4">
                    <h5 class="text-white fw-bold mb-4"><i class="ti ti-chart-line me-2 text-success"></i> Activity Intelligence</h5>
                    <canvas id="complaintChart" height="130"></canvas>
                </div>
            </div>

            <div class="col-lg-4 mb-4">
                <div class="content-panel">
                    <h5 class="text-white fw-bold mb-4"><i class="ti ti-mail-fast me-2 text-success"></i> Recent Enquiries</h5>
                    <div class="custom-scroll" style="max-height: 380px; overflow-y: auto;">
                        <div th:each="enq : ${enquiries}" class="enquiry-item">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span style="color: var(--cyber-green); font-weight: 700;" th:text="${enq.name}">User</span>
                                <span style="color: #94a3b8; font-size: 0.75rem;" th:text="${#temporals.format(enq.enquiryDate, 'dd MMM yyyy')}">Date</span>
                            </div>
                            <div class="text-truncate small" th:text="${enq.subject}">Subject text...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        
         <script th:inline="javascript">
            const ctx = document.getElementById('complaintChart');
            new Chart(ctx, {
              type: 'line',
              data: {
                labels: [[${complaintMonths}]],
                datasets: [{
                  label: 'Complaints Filed',
                  data: [[${complaintCounts}]],
                  borderColor: '#22c55e',
                  backgroundColor: 'rgba(34, 197, 94, 0.15)',
                  borderWidth: 4,
                  tension: 0.4,
                  fill: true,
                  pointBackgroundColor: '#ffffff',
                  pointBorderColor: '#22c55e',
                  pointRadius: 6,
                  pointHoverRadius: 8
                }]
              },
              options: {
                plugins: { legend: { labels: { color: '#f8fafc', font: { weight: 'bold' } } } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#cbd5e1', font: { size: 12 } } },
                    x: { grid: { display: false }, ticks: { color: '#cbd5e1', font: { size: 12 } } }
                }
              }
            });
        </script>
    </main>
</body>
</html>
