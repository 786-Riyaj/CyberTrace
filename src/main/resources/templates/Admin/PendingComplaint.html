<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
	<main
		style="background-color: #020617; min-height: 100vh; padding: 30px;">

		<style>
:root {
	--cyber-green: #22c55e;
	--cyber-red: #ef4444;
	--cyber-yellow: #eab308;
	--panel-bg: #0f172a;
	--text-bright: #ffffff;
	--text-dim: #cbd5e1;
}

.custom-panel {
	background: var(--panel-bg);
	border: 1px solid rgba(34, 197, 94, 0.2);
	border-radius: 12px;
	overflow: hidden;
	box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
}

.panel-header {
	background: rgba(34, 197, 94, 0.1);
	border-bottom: 2px solid var(--cyber-green);
	padding: 20px;
}

.panel-header h4 {
	color: var(--cyber-green);
	font-weight: 800;
	margin: 0;
	text-transform: uppercase;
	letter-spacing: 1.5px;
}

/* --- Table Styling --- */
.custom-table {
	color: var(--text-bright) !important;
}

.custom-table thead th {
	background: #1e293b;
	color: var(--cyber-green);
	padding: 15px;
	font-weight: 800;
	font-size: 0.8rem;
	text-align: center;
	border: none;
}

.custom-table td {
	border-bottom: 1px solid rgba(255, 255, 255, 0.05);
	padding: 12px;
	vertical-align: middle;
	text-align: center;
	color: var(--text-dim);
	font-size: 0.85rem;
}

/* --- Controls & Badges --- */
.cyber-select {
	background: #020617 !important;
	border: 1px solid #334155 !important;
	color: white !important;
	font-size: 0.8rem;
	border-radius: 4px;
}

.badge-pending {
	background: rgba(234, 179, 8, 0.2);
	color: var(--cyber-yellow);
	border: 1px solid var(--cyber-yellow);
	padding: 5px 12px;
}

/* --- Modal Styling --- */
.modal-content {
	background: var(--panel-bg);
	color: white;
	border: 1px solid var(--cyber-green);
}

.modal-header {
	border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.cyber-textarea {
	background: #020617 !important;
	border: 1px solid #334155 !important;
	color: white !important;
}

/* --- Fixed Width Toast --- */
#custom-toast {
	position: fixed;
	top: 85px;
	right: 20px;
	background: #0f172a;
	border-left: 5px solid var(--cyber-green);
	color: white;
	padding: 20px;
	border-radius: 8px;
	box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
	display: none;
	z-index: 10000;
	width: 350px;
	max-width: 90vw;
	word-wrap: break-word;
	animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@
keyframes slideIn {from { transform:translateX(120%);
	
}

to {
	transform: translateX(0);
}
}
</style>

		<div class="container-fluid">
			<div class="row">
				<div class="col-12">
					<div class="custom-panel shadow">
						<div class="panel-header text-center">
							<h4>
								<i class="fas fa-exclamation-triangle me-2"></i> Manage Pending
								Complaints
							</h4>
						</div>

						<div class="card-body p-0">
							<div class="table-responsive">
								<table class="table custom-table">
									<thead>
										<tr>
											<th>#</th>
											<th>ID</th>
											<th>Victim</th>
											<th>Contact</th>
											<th>Scammer</th>
											<th>Subject</th>
											<th>Scam Type</th>
											<th>Status</th>
											<th>Date</th>
											<th>Evidence</th>
											<th>Action</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="com, srno : ${complaints}">
											<td th:text="${srno.index+1}"></td>
											<td class="text-white fw-bold" th:text="${com.complaintId}"></td>
											<td class="text-white" th:text="${com.name}"></td>
											<td th:text="${com.contactNo}"></td>
											
											<td>
												<div class="small text-danger"
													style="max-width: 220px; white-space: normal;"
													th:text="${com.scammer}"></div>
											</td>
											<td >
											<div class=""
													style="max-width: 220px; white-space: normal;"
													th:text="${com.title}"></div>
											</td>
											
											
											<td th:text="${com.typeOfScam}"></td>
											<td><span class="badge badge-pending rounded-pill"
												th:text="${com.status}"></span></td>
											<td
												th:text="${#temporals.format(com.regDateTime, 'dd-MM-yyyy')}"></td>
											<td>
												<button class="btn btn-outline-success btn-sm px-3"
													data-bs-toggle="modal"
													th:data-bs-target="${'#evidenceModal__' + com.id}">
													<i class="fas fa-images"></i>
												</button>
											</td>
											<td>
												<div class="d-flex gap-2 justify-content-center">
													<form action="AssignComplaint" method="post"
														class="d-flex gap-1">
														<select name="assignTo" class="form-select cyber-select"
															style="width: 130px;" required>
															<option value="">Assign To...</option>
															<option th:each="ins: ${investigators}"
																th:value="${ins.id}" th:text="${ins.name}"></option>
														</select> <input type="hidden" name="cid" th:value="${com.id}">
														<button class="btn btn-success btn-sm">Assign</button>
														<button class="btn btn-danger btn-sm"
															data-bs-toggle="modal"
															th:data-bs-target="${'#complaintModal__' + com.id}">Reject</button>
													</form>

												</div>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div th:each="com :${complaints}" class="modal fade"
			th:id="${'complaintModal__' + com.id}" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-ban text-danger me-2"></i> Reject Complaint
						</h5>
						<button type="button" class="btn-close btn-close-white"
							data-bs-dismiss="modal"></button>
					</div>
					<form action="RejectComplaint" method="post">
						<div class="modal-body">
							<p class="small text-dim">
								Complaint: <b class="text-white" th:text="${com.title}"></b>
							</p>
							<label class="mb-2">Reason for Rejection</label> <input
								type="hidden" th:value="${com.id}" name="cid">
							<textarea name="message" rows="3"
								class="form-control cyber-textarea"
								placeholder="Explain why this is being rejected..." required></textarea>
						</div>
						<div class="modal-footer border-0">
							<button type="button" class="btn btn-outline-light btn-sm"
								data-bs-dismiss="modal">Close</button>
							<button type="submit" class="btn btn-danger btn-sm">Reject
								Complaint</button>
						</div>
					</form>
				</div>
			</div>
		</div>

		<div th:each="com : ${complaints}" class="modal fade"
			th:id="${'evidenceModal__' + com.id}" tabindex="-1">
			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-file-invoice me-2"></i> Case Evidence
						</h5>
						<button type="button" class="btn-close btn-close-white"
							data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<div class="row g-3">
							<div class="col-sm-4" th:each="images : ${com.evidence}">
								<div class="border border-secondary p-1 rounded">
									<img class="w-100 rounded" alt="Evidence"
										th:src="@{'/uploads/' + ${images}}"
										style="height: 150px; object-fit: cover;">
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="custom-toast">
			<div class="d-flex align-items-start">
				<i class="fas fa-shield-check text-success fs-3 me-3 mt-1"></i>
				<div style="flex: 1;">
					<h6 class="m-0 fw-bold text-success">System Update</h6>
					<div id="toast-text" class="small mt-1"
						style="color: white; font-weight: 500;"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			var msg = /*[[${msg}]]*/"";
			if (msg && msg.trim() !== "" && msg !== "null") {
				var toast = document.getElementById('custom-toast');
				document.getElementById('toast-text').innerText = msg;
				toast.style.display = 'block';
				setTimeout(function() {
					toast.style.opacity = '0';
					toast.style.transition = '0.8s';
					setTimeout(function() {
						toast.style.display = 'none';
					}, 800);
				}, 4500);
			}
		</script>
	</main>
</body>
</html>
