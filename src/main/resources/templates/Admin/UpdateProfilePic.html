<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
	<main style="background-color: #020617; min-height: 100vh; padding: 40px 10px;">
		
		<style>
			:root {
				--cyber-green: #22c55e;
				--cyber-red: #ef4444;
				--panel-bg: #0f172a;
				--text-main: #ffffff;
				--text-dim: #cbd5e1;
			}

			.profile-card {
				background: var(--panel-bg);
				border: 1px solid rgba(34, 197, 94, 0.2);
				border-radius: 20px;
				overflow: hidden;
				box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
			}

			.card-accent-header {
				background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
				border-bottom: 1px solid rgba(34, 197, 94, 0.2);
				padding: 25px;
				text-align: center;
			}

			.card-accent-header h4 {
				color: var(--cyber-green);
				font-weight: 800;
				margin: 0;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			/* --- Avatar Display --- */
			.avatar-container {
				position: relative;
				display: inline-block;
				margin-bottom: 25px;
			}

			.avatar-img {
				width: 180px;
				height: 180px;
				object-fit: cover;
				border: 4px solid var(--cyber-green);
				padding: 5px;
				background: #020617;
				box-shadow: 0 0 25px rgba(34, 197, 94, 0.2);
			}

			/* --- Form Elements --- */
			.upload-box {
				background: rgba(0, 0, 0, 0.3);
				padding: 30px;
				border-radius: 15px;
				border: 1px dashed #334155;
			}

			.cyber-file-input {
				background: #020617 !important;
				border: 1px solid #334155 !important;
				color: white !important;
				padding: 10px;
				margin-bottom: 20px;
			}

			/* --- Perfect Buttons --- */
			.btn-upload {
				background: var(--cyber-green);
				color: #020617 !important;
				font-weight: 800;
				border: none;
				padding: 12px 30px;
				border-radius: 8px;
				text-transform: uppercase;
				transition: 0.3s;
				flex: 1;
			}

			.btn-upload:hover {
				background: #4ade80;
				box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
			}

			

			.btn-cancel:hover {
				background: var(--cyber-red);
				border-color: var(--cyber-red);
			}

			/* --- Message Toast (Symmetric Design) --- */
			#custom-toast {
				position: fixed;
				top: 85px;
				right: 20px;
				background: #0f172a;
				border-left: 5px solid var(--cyber-green);
				color: white;
				padding: 20px;
				border-radius: 10px;
				box-shadow: 0 15px 45px rgba(0,0,0,0.8);
				display: none;
				z-index: 10000;
				width: 350px;           /* Fixed Width */
				max-width: 90vw;
				word-wrap: break-word;  /* Text won't overflow */
				animation: slideIn 0.5s ease-out;
			}

			@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
		</style>

		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6 col-md-8">
					<div class="profile-card animate__animated animate__fadeIn">
						
						<div class="card-accent-header">
							<h4>Update Profile Pic</h4>
						</div>

						<div class="card-body p-4 p-md-5 text-center">
							<div class="avatar-container">
								<img class="rounded-circle avatar-img" 
									 th:src="@{${session.loggedInAdmin.profilePic != null ? '/Profile/' + session.loggedInAdmin.profilePic : '../assets/images/user/avatar-2.jpg'}}" 
									 alt="Current Profile">
							</div>

							<div class="upload-box">
								<form th:action="@{/Admin/UpdateProfilePic}" method="post" enctype="multipart/form-data">
									<label class="d-block text-start mb-2 fw-bold" style="color: var(--text-dim);">Choose New Photo</label>
									<input type="file" name="profilePic" class="form-control cyber-file-input" required>
									
									<div class="d-flex gap-3">
										<button type="submit" class="btn-upload">
											<i class="fas fa-upload me-2"></i> Upload Pic
										</button>
										<a th:href="@{/Admin/Dashboard}" class="btn-upload">
											Cancel
										</a>
									</div>
								</form>
							</div>
							
							<p class="mt-4 small" style="color: #64748b;">Supported formats: JPG, PNG, GIF (Max 2MB)</p>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="custom-toast">
			<div class="d-flex align-items-start">
				<i class="fas fa-check-circle text-success fs-3 me-3 mt-1"></i>
				<div style="flex: 1;">
					<h6 class="m-0 fw-bold text-success">Security Alert</h6>
					<div id="toast-text" class="small mt-1" style="color: white; font-weight: 500; line-height: 1.4;"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			// Professional Message Logic
			var msg = /*[[${msg}]]*/ "";
			if (msg && msg.trim() !== "" && msg !== "null") {
				var toast = document.getElementById('custom-toast');
				var toastText = document.getElementById('toast-text');
				
				toastText.innerText = msg;
				toast.style.display = 'block';

				setTimeout(function() {
					toast.style.opacity = '0';
					toast.style.transition = '0.8s ease';
					setTimeout(function() { toast.style.display = 'none'; }, 800);
				}, 4000);
			}
		</script>
	</main>
</body>
</html>
