<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
	<main style="background-color: #020617; min-height: 100vh; padding: 40px 10px;">
		
		<style>
			:root {
				--cyber-green: #22c55e;
				--cyber-red: #ef4444;
				--panel-bg: #0f172a;
				--text-main: #ffffff;
				--text-dim: #cbd5e1;
			}

			.profile-card {
				background: var(--panel-bg);
				border: 1px solid rgba(34, 197, 94, 0.2);
				border-radius: 20px;
				overflow: hidden;
				box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
			}

			.card-accent-header {
				background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
				border-bottom: 1px solid rgba(34, 197, 94, 0.2);
				padding: 25px;
				text-align: center;
			}

			.card-accent-header h4 {
				color: var(--cyber-green);
				font-weight: 800;
				margin: 0;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			/* --- Form High Visibility --- */
			.cyber-input {
				background: #020617 !important;
				border: 1px solid #334155 !important;
				color: white !important;
				padding: 12px 15px;
				border-radius: 10px;
				margin-bottom: 15px;
				transition: 0.3s;
			}

			.cyber-input:focus {
				border-color: var(--cyber-green) !important;
				box-shadow: 0 0 15px rgba(34, 197, 94, 0.3) !important;
				outline: none;
			}

			.input-label {
				color: var(--text-dim);
				font-weight: 600;
				display: block;
				text-align: left;
				margin-bottom: 5px;
				font-size: 0.9rem;
			}

			/* --- Buttons --- */
			.btn-change {
				background: var(--cyber-green);
				color: #020617 !important;
				font-weight: 800;
				border: none;
				padding: 12px 30px;
				border-radius: 8px;
				text-transform: uppercase;
				transition: 0.3s;
				flex: 1;
			}

			.btn-change:hover {
				background: #4ade80;
				box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
				transform: translateY(-2px);
			}

			

			.btn-cancel:hover {
				background: var(--cyber-red);
				border-color: var(--cyber-red);
				transform: translateY(-2px);
			}

			/* --- Message Toast (Symmetric Design) --- */
			#custom-toast {
				position: fixed;
				top: 85px;
				right: 20px;
				background: #0f172a;
				border-left: 5px solid var(--cyber-green);
				color: white;
				padding: 20px;
				border-radius: 10px;
				box-shadow: 0 15px 45px rgba(0,0,0,0.8);
				display: none;
				z-index: 10000;
				width: 350px;           
				max-width: 90vw;
				word-wrap: break-word;  
				animation: slideIn 0.5s ease-out;
			}

			@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
		</style>

		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6 col-md-8">
					<div class="profile-card animate__animated animate__fadeIn">
						
						<div class="card-accent-header">
							<h4><i class="fas fa-key me-2"></i> Change Password</h4>
						</div>

						<div class="card-body p-4 p-md-5">
							<form method="post" th:action="@{/Investigator/ChangePassword}">
								
								<div class="form-group">
									<label class="input-label">Current Password</label>
									<input type="password" name="oldPassword"
										class="form-control cyber-input" placeholder="Enter old password" required>
								</div>

								<div class="form-group">
									<label class="input-label">New Password</label>
									<input type="password" name="newPassword"
										class="form-control cyber-input" placeholder="Enter new password" required>
								</div>

								<div class="form-group">
									<label class="input-label">Confirm New Password</label>
									<input type="password" name="confirmPassword"
										class="form-control cyber-input" placeholder="Repeat new password" required>
								</div>

								<div class="d-flex gap-3 mt-4">
									<button type="submit" class="btn-change">
										<i class="fas fa-sync-alt me-2"></i> Update
									</button>
									<a th:href="@{/Admin/Dashboard}" class="btn-change text-center">
										Cancel
									</a>
								</div>
							</form>
							
							<div class="mt-4 text-center">
								<p class="small" style="color: #64748b;">
									<i class="fas fa-shield-alt me-1"></i> Use a strong password with symbols.
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="custom-toast">
			<div class="d-flex align-items-start">
				<i class="fas fa-lock text-success fs-3 me-3 mt-1"></i>
				<div style="flex: 1;">
					<h6 class="m-0 fw-bold text-success">Security System</h6>
					<div id="toast-text" class="small mt-1" style="color: white; font-weight: 500; line-height: 1.4;"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			// Toast/Message Handling
			var msg = /*[[${msg}]]*/ "";
			if (msg && msg.trim() !== "" && msg !== "null") {
				var toast = document.getElementById('custom-toast');
				var toastText = document.getElementById('toast-text');
				
				toastText.innerText = msg;
				toast.style.display = 'block';

				setTimeout(function() {
					toast.style.opacity = '0';
					toast.style.transition = '0.8s ease';
					setTimeout(function() { toast.style.display = 'none'; }, 800);
				}, 4000);
			}
		</script>
	</main>
</body>
</html>
