<html th:replace="~{Admin/AdminBase::layout(~{::main})}">
<body>
	<main style="background-color: #020617; min-height: 100vh; padding: 30px;">
		
		<style>
			:root {
				--cyber-primary: #22c55e;
				--cyber-danger: #ef4444;
				--page-bg: #020617;
				--card-bg: #0f172a;
				--text-main: #e5e7eb;
				--text-muted: #94a3b8;
			}

			.custom-panel {
				background: var(--card-bg);
				border: 1px solid rgba(255, 255, 255, 0.05);
				border-radius: 12px;
				overflow: hidden;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
			}

			.panel-header {
				background: rgba(34, 197, 94, 0.05);
				border-bottom: 2px solid var(--cyber-primary);
				padding: 20px;
			}

			.panel-header h4 {
				color: var(--cyber-primary);
				font-weight: 700;
				margin: 0;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			/* --- Table Styling --- */
			.custom-table { color: var(--text-main) !important; }
			
			.custom-table thead th {
				background: #16213e;
				color: var(--cyber-primary);
				padding: 15px;
				font-weight: 600;
				font-size: 0.85rem;
				border: none;
				text-transform: uppercase;
			}

			.custom-table tbody td {
				border-bottom: 1px solid rgba(255, 255, 255, 0.03);
				padding: 14px;
				vertical-align: middle;
				color: var(--text-muted);
				font-size: 0.9rem;
			}

			.highlight-text {
				color: var(--text-main);
				font-weight: 600;
			}

			/* --- Action Buttons --- */
			.btn-delete-cyber {
				background: transparent;
				color: var(--cyber-danger) !important;
				border: 1px solid var(--cyber-danger);
				font-weight: 500;
				padding: 6px 16px;
				border-radius: 6px;
				transition: 0.3s;
			}

			.btn-delete-cyber:hover {
				background: var(--cyber-danger);
				color: #ffffff !important;
			}

			/* --- Fixed Width Toast --- */
			#custom-toast {
				position: fixed; top: 85px; right: 25px;
				background: var(--card-bg); 
				border-left: 5px solid var(--cyber-primary);
				color: var(--text-main); 
				padding: 20px; 
				border-radius: 8px;
				box-shadow: 0 15px 50px rgba(0,0,0,0.8);
				display: none; 
				z-index: 10000; 
				width: 350px;
				max-width: 90vw; 
				word-wrap: break-word;
				animation: slideIn 0.4s ease-out;
			}
			@keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
		</style>

		<div class="container-fluid">
			<div class="row">
				<div class="col-12">
					<div class="custom-panel shadow animate__animated animate__fadeIn">
						<div class="panel-header text-center">
							<h4><i class="fas fa-clipboard-list me-2"></i> Manage Citizen Enquiries</h4>
						</div>

						<div class="card-body p-0">
							<div class="table-responsive">
								<table class="table custom-table">
									<thead>
										<tr>
											<th>#</th>
											<th>Name</th>
											<th>Gender</th>
											<th>Contact Info</th>
											<th>Subject</th>
											<th>Message</th>
											<th>Address</th>
											<th>Submitted On</th>
											<th>Action</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="enq, srno : ${enquiries}">
											<td th:text="${srno.index+1}" class="text-white"></td>
											<td class="highlight-text" th:text="${enq.name}"></td>
											<td th:text="${enq.gender}"></td>
											<td class="text-start">
												<div class="small mb-1"><i class="fas fa-phone-alt me-2 text-success"></i> <span th:text="${enq.contactNo}"></span></div>
												<div class="small text-truncate" style="max-width: 160px;"><i class="fas fa-envelope me-2 text-success"></i> <span th:text="${enq.email}"></span></div>
											</td>
											<td class="highlight-text" th:text="${enq.subject}"></td>
											<td>
												<div class="small" style="max-width: 220px; white-space: normal; color: var(--text-muted);" th:text="${enq.message}"></div>
											</td>
											<td class="small" th:text="${enq.address}"></td>
											<td class="small" th:text="${#temporals.format(enq.enquiryDate, 'dd MMM yyyy HH:mm')}"></td>
											<td>
												<a class="btn btn-delete-cyber btn-sm"
												   th:href="@{/Admin/DeleteEnquiry/{id}(id=${enq.id})}"
												   onclick="return confirm('Do you want to permanently remove this record?')">
													<i class="fas fa-trash-alt me-1"></i> Delete
												</a>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="custom-toast">
			<div class="d-flex align-items-start">
				<i class="fas fa-check-circle text-success fs-3 me-3 mt-1"></i>
				<div style="flex: 1;">
					<h6 class="m-0 fw-bold text-success">Operation Successful</h6>
					<div id="toast-text" class="small mt-1" style="color: var(--text-main); font-weight: 400;"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
			var msg = /*[[${msg}]]*/ "";
			if (msg && msg.trim() !== "" && msg !== "null") {
				var toast = document.getElementById('custom-toast');
				document.getElementById('toast-text').innerText = msg;
				toast.style.display = 'block';
				setTimeout(function() {
					toast.style.opacity = '0';
					toast.style.transition = '0.8s ease';
					setTimeout(function() { toast.style.display = 'none'; }, 800);
				}, 4500);
			}
		</script>
	</main>
</body>
</html>
