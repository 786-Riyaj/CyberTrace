<html th:replace="~{base::layout(~{::main})}">

<body>
	<main>
		<style>
			/* --- Root Colors Sync --- */
			:root {
				--primary-green: #22c55e;
				--dark-bg: #020617;
				--card-glass: rgba(15, 23, 42, 0.85);
				--text-gray: #94a3b8;
			}

			#LoginMain {
				background-image: url("https://www.consultancy.in/media/ranking-details/IN/cyber-security.webp");
				background-size: cover;
				background-position: center;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
			}

			/* Dark Cyber Overlay */
			#LoginMain::before {
				content: "";
				position: absolute;
				inset: 0;
				background: radial-gradient(circle, rgba(2, 6, 23, 0.7) 0%, rgba(2, 6, 23, 0.95) 100%);
				backdrop-filter: blur(4px);
			}

			.login-card {
				position: relative;
				z-index: 10;
				width: 600px;
				padding: 40px;
				border-radius: 20px;
				background: var(--card-glass);
				backdrop-filter: blur(15px);
				border: 1px solid rgba(34, 197, 94, 0.3);
				box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
			}

			.login-card h3 {
				color: #ffffff;
				font-weight: 800;
				letter-spacing: 1px;
				margin-bottom: 5px;
			}

			.login-card p {
				color: var(--text-gray);
				font-size: 0.9rem;
				margin-bottom: 30px;
			}

			/* --- Form Styling --- */
			.form-group label {
				color: #e5e7eb;
				font-size: 0.85rem;
				font-weight: 600;
				margin-bottom: 8px;
				display: block;
			}

			.custom-input {
				background: rgba(2, 6, 23, 0.8) !important;
				border: 1px solid #334155 !important;
				color: #ffffff !important;
				height: 50px;
				border-radius: 10px;
				padding-left: 15px;
				transition: 0.3s;
			}

			.custom-input:focus {
				border-color: var(--primary-green) !important;
				box-shadow: 0 0 15px rgba(34, 197, 94, 0.2) !important;
				outline: none;
			}

			.custom-input::placeholder {
				color: #4b5563;
			}

			.login-btn {
				background-color: var(--primary-green);
				color: #020617 !important;
				width: 100%;
				height: 50px;
				border-radius: 10px;
				font-size: 1rem;
				font-weight: 800;
				border: none;
				text-transform: uppercase;
				transition: 0.3s;
				margin-top: 10px;
			}

			.login-btn:hover {
				background-color: #4ade80;
				transform: translateY(-2px);
				box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
			}

			.forgot-link {
				color: var(--text-gray);
				text-decoration: none;
				font-size: 0.85rem;
				transition: 0.3s;
			}

			.forgot-link:hover {
				color: var(--primary-green);
			}

			/* Shield Icon Glow */
			.login-icon {
				font-size: 3rem;
				color: var(--primary-green);
				margin-bottom: 15px;
				filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5));
			}
		</style>

		<div id="LoginMain">
			<div class="login-card animate__animated animate__fadeIn">
				
				<div class="text-center">
					<div class="login-icon">
						<i class="fas fa-user-shield"></i>
					</div>
					<h3>Welcome Back</h3>
					<p>Login to your secure dashboard</p>
				</div>

				<form th:action="@{/Login}" method="post" th:object="${dto}">

					<div class="form-group mt-3">
						<label>Email Address</label>
						<input th:field="*{email}" type="email" class="form-control custom-input" 
							placeholder="name@example.com" required>
					</div>

					<div class="form-group mt-4">
						<label>Secret Password</label>
						<input th:field="*{password}" type="password" class="form-control custom-input" 
							placeholder="••••••••" required>
					</div>

					<div class="mt-4">
						<button type="submit" class="login-btn">
							<i class="fas fa-sign-in-alt me-2"></i> Access Portal
						</button>
					</div>

					<div class="text-center mt-4">
						<a href="#" class="forgot-link">Forgot password?</a>
						<hr style="border-color: rgba(255,255,255,0.1);">
						<span style="font-size: 0.8rem; color: #4b5563;">
							Secured by CyberTrace Intelligence
						</span>
					</div>

				</form>

			</div>
		</div>
		
		<script th:inline="javascript">
			var msg = [[${msg}]];
			if(msg && msg.trim() !== "") {
				alert(msg);
			}
		</script>

	</main>
</body>

</html>
