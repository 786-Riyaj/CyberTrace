<html th:replace="~{Investigator/Investigatorbase::layout(~{::main})}">
<body>
    <main style="background-color: #020617; min-height: 100vh; padding: 25px;">
        
        <style>
            :root {
                --cyber-green: #22c55e;
                --cyber-blue: #3b82f6;
                --panel-bg: #0f172a;
                --text-bright: #ffffff;
                --text-dim: #cbd5e1;
                --border-line: rgba(34, 197, 94, 0.25);
            }

            /* Main Card Panel */
            .custom-panel {
                background: var(--panel-bg);
                border: 1px solid var(--border-line);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            }

            .panel-header {
                background: rgba(34, 197, 94, 0.1);
                border-bottom: 2px solid var(--cyber-green);
                padding: 15px 20px;
            }

            .panel-header h4 {
                color: var(--cyber-green);
                font-weight: 800;
                margin: 0;
                font-size: 1.1rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
            }

            /* --- Table Design Sync --- */
            .table-responsive {
                scrollbar-width: thin;
                scrollbar-color: var(--cyber-green) var(--panel-bg);
            }

            .custom-table { width: 100%; border-collapse: collapse; }
            
            .custom-table thead th {
                background: #1e293b;
                color: var(--cyber-green);
                padding: 12px;
                font-weight: 800;
                font-size: 0.8rem;
                text-align: center;
                text-transform: uppercase;
                border: none;
                white-space: nowrap;
            }

            .custom-table td {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 12px;
                vertical-align: middle;
                text-align: center;
                color: var(--text-dim);
                font-size: 0.85rem;
            }

            .custom-table tr:hover {
                background: rgba(255, 255, 255, 0.02);
            }

            /* --- Highlights --- */
            .text-white-sharp { color: var(--text-bright) !important; font-weight: 600; }
            .text-danger-scam { color: #ef4444 !important; font-weight: 700; }

            .badge-status {
                background: rgba(234, 179, 8, 0.1);
                color: #eab308;
                border: 1px solid #eab308;
                padding: 4px 10px;
                font-size: 0.75rem;
                font-weight: 600;
            }

            /* --- Action Buttons --- */
            .btn-cyber-sm {
                font-size: 0.75rem;
                font-weight: 700;
                padding: 5px 12px;
                border-radius: 4px;
                transition: 0.3s;
                text-transform: uppercase;
            }

            .btn-view-ev { border: 1px solid var(--cyber-blue); color: var(--cyber-blue); background: transparent; }
            .btn-view-ev:hover { background: var(--cyber-blue); color: #fff; }

            .btn-close-case { background: var(--cyber-green); color: #000; border: none; }
            .btn-reject-case { background: #ef4444; color: #fff; border: none; }

            /* --- Modal Customization --- */
            .modal-content { background: var(--panel-bg); border: 1px solid var(--cyber-green); color: #fff; }
            .modal-header { border-bottom: 1px solid var(--border-line); }
            .modal-footer { border-top: 1px solid var(--border-line); }
            .form-control { 
                background: #020617 !important; 
                border: 1px solid var(--border-line) !important; 
                color: #fff !important; 
                font-size: 0.85rem;
            }
        </style>

        <div class="row">
            <div class="col-sm-12">
                <div class="custom-panel shadow">
                    <div class="panel-header text-center">
                        <h4><i class="fas fa-list-check me-2"></i> Manage Pending Complaints</h4>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Sr. No.</th>
                                        <th>Complaint Id</th>
                                        <th>Victim Name</th>
                                        <th>Contact No.</th>
                                        <th>Scammer</th>
                                        <th>Title</th>
                                        <th>Type of Scam</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Evidence</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="com, srno : ${complaints}">
                                        <td th:text="${srno.index+1}"></td>
                                        <td class="text-white-sharp" th:text="${com.complaintId}"></td>
                                        <td class="text-white-sharp" th:text="${com.name}"></td>
                                        <td th:text="${com.contactNo}"></td>
                                        <td class="text-danger-scam" th:text="${com.scammer}"></td>
                                        <td th:text="${com.title}"></td>
                                        <td th:text="${com.typeOfScam}"></td>
                                        <td>
                                            <span class="badge badge-status rounded-pill" th:text="${com.status}"></span>
                                        </td>
                                        <td th:text="${#temporals.format(com.regDateTime, 'dd-MM-yyyy hh:mm a')}"></td>
                                        <td>
                                            <button class="btn btn-view-ev btn-cyber-sm" data-bs-toggle="modal" th:data-bs-target="${'#evidenceModal__' + com.id}">
                                                <i class="fas fa-eye"></i> View
                                            </button>
                                        </td>
                                        <td>
                                            <div class="d-flex justify-content-center gap-2">
                                                <button class="btn btn-close-case btn-cyber-sm" data-bs-toggle="modal" th:data-bs-target="${'#closeModal__' + com.id}">Close</button>
                                                <button class="btn btn-reject-case btn-cyber-sm" data-bs-toggle="modal" th:data-bs-target="${'#complaintModal__' + com.id}">Reject</button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:each="com :${complaints}" class="modal fade" th:id="${'complaintModal__' + com.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fs-6 text-danger"><i class="fas fa-ban me-2"></i> Reject Complaint</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form action="RejectComplaint" method="post">
                        <div class="modal-body">
                            <p class="small text-dim">Title: <span class="text-white" th:text="${com.title}"></span></p>
                            <label class="mb-2 small">Reason of Rejection</label>
                            <input type="hidden" th:value="${com.id}" name="cid">
                            <textarea name="message" rows="3" class="form-control" placeholder="Provide reason..."></textarea>
                        </div>
                        <div class="modal-footer py-2">
                            <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-sm btn-danger px-3">Confirm Reject</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:each="com :${complaints}" class="modal fade" th:id="${'closeModal__' + com.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fs-6 text-success"><i class="fas fa-check-circle me-2"></i> Close Case</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form action="CloseComplaint" method="post">
                        <div class="modal-body">
                            <p class="small text-dim">Title: <span class="text-white" th:text="${com.title}"></span></p>
                            <label class="mb-2 small">Closing Summary</label>
                            <input type="hidden" th:value="${com.id}" name="cid">
                            <textarea name="message" rows="3" class="form-control" placeholder="Final investigation summary..."></textarea>
                        </div>
                        <div class="modal-footer py-2">
                            <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-sm btn-close-case px-4">Finalize & Close</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:each="com : ${complaints}" class="modal fade" th:id="${'evidenceModal__' + com.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fs-6 text-info"><i class="fas fa-images me-2"></i> Evidence Files</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body bg-black">
                        <div class="row g-3">
                            <div class="col-sm-4" th:each="images : ${com.evidence}">
                                <div class="border border-secondary p-1 rounded">
                                    <img class="w-100 rounded" th:src="@{'/uploads/' + ${images}}" style="height: 160px; object-fit: cover;">
                                </div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(com.evidence)}" class="text-center p-4">
                            <p class="text-dim small">No evidence images available.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            var msg = "[[${msg}]]";
            if(msg != "" && msg != "null"){
                alert(msg);
            }
        </script>
    </main>
</body>
</html>
