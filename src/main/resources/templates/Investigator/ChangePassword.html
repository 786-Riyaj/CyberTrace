<html th:replace="~{Investigator/Investigatorbase::layout(~{::main})}">
<body>
    <main style="background-color: #020617; min-height: 100vh; padding: 40px 15px;">
        
        <style>
            :root {
                --cyber-green: #22c55e;
                --cyber-red: #ef4444;
                --panel-bg: #0f172a;
                --text-bright: #ffffff;
                --text-dim: #cbd5e1;
            }

            /* --- Cyber Card Design --- */
            .profile-card {
                background: var(--panel-bg);
                border: 1px solid rgba(34, 197, 94, 0.2);
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                max-width: 550px;
                margin: auto;
            }

            .card-accent-header {
                background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
                border-bottom: 1px solid rgba(34, 197, 94, 0.2);
                padding: 25px;
                text-align: center;
            }

            .card-accent-header h4 {
                color: var(--cyber-green);
                font-weight: 800;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 2px;
                font-size: 1.2rem;
            }

            /* --- Form Inputs --- */
            .form-control-cyber {
                background: #020617 !important;
                border: 1px solid #334155 !important;
                color: white !important;
                padding: 12px 15px;
                border-radius: 8px;
                font-size: 0.9rem;
                transition: all 0.3s ease;
            }

            .form-control-cyber:focus {
                border-color: var(--cyber-green) !important;
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            }

            /* --- ACTION BUTTONS (Symmetric Style) --- */
            .btn-group-custom {
                display: flex;
                gap: 15px;
                margin-top: 25px;
            }

            .btn-cyber {
                flex: 1; 
                font-weight: 800;
                padding: 12px 20px;
                border-radius: 8px;
                text-transform: uppercase;
                transition: all 0.3s ease;
                letter-spacing: 1px;
                border: none;
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }

            .btn-submit {
                background: var(--cyber-green);
                color: #020617 !important;
            }

            .btn-submit:hover {
                background: #4ade80;
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
                transform: translateY(-2px);
            }

            .btn-cancel {
                background: #1e293b;
                color: white !important;
                text-decoration: none;
                border: 1px solid #334155;
            }

            .btn-cancel:hover {
                background: var(--cyber-red);
                border-color: var(--cyber-red);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
                transform: translateY(-2px);
            }

            /* --- Message Toast --- */
            #custom-toast {
                position: fixed;
                top: 85px;
                right: 20px;
                background: #0f172a;
                border-left: 5px solid var(--cyber-green);
                color: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 15px 45px rgba(0,0,0,0.8);
                display: none;
                z-index: 10000;
                width: 350px;
                animation: slideIn 0.5s ease-out;
            }
            @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        </style>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="profile-card">
                        
                        <div class="card-accent-header">
                            <h4><i class="ti ti-shield-lock me-2"></i> Security Credentials</h4>
                        </div>

                        <div class="card-body p-4 p-md-5">
                            <form method="post" th:action="@{/Investigator/ChangePassword}">
                                
                                <div class="mb-3">
                                    <label class="text-white small fw-bold mb-2 d-block" style="letter-spacing: 0.5px;">CURRENT PASSWORD</label>
                                    <input type="password" name="oldPassword"
                                        class="form-control form-control-cyber" placeholder="••••••••" required>
                                </div>

                                <div class="mb-3">
                                    <label class="text-white small fw-bold mb-2 d-block" style="letter-spacing: 0.5px;">NEW PASSWORD</label>
                                    <input type="password" name="newPassword"
                                        class="form-control form-control-cyber" placeholder="••••••••" required>
                                </div>

                                <div class="mb-4">
                                    <label class="text-white small fw-bold mb-2 d-block" style="letter-spacing: 0.5px;">CONFIRM PASSWORD</label>
                                    <input type="password" name="confirmPassword"
                                        class="form-control form-control-cyber" placeholder="••••••••" required>
                                </div>

                                <div class="btn-group-custom">
                                    <button type="submit" class="btn-cyber btn-submit">
                                        <i class="ti ti-lock-access me-2"></i> Update Password
                                    </button>
                                    <a th:href="@{/Investigator/ViewProfile}" class="btn-cyber btn-cancel">
                                        <i class="ti ti-arrow-back-up me-2"></i> Back
                                    </a>
                                </div>
                            </form>
                            
                            <p class="mt-4 mb-0 text-center small" style="color: #64748b;">
                                <i class="ti ti-shield-check me-1"></i> Use a strong password with at least 8 characters.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="custom-toast">
            <div class="d-flex align-items-start">
                <i class="ti ti-shield-check text-success fs-3 me-3"></i>
                <div style="flex: 1;">
                    <h6 class="m-0 fw-bold text-success">Security Notification</h6>
                    <div id="toast-text" class="small mt-1" style="color: white; line-height: 1.4;"></div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            var msg = /*[[${msg}]]*/ "";
            if (msg && msg.trim() !== "" && msg !== "null") {
                var toast = document.getElementById('custom-toast');
                var toastText = document.getElementById('toast-text');
                toastText.innerText = msg;
                toast.style.display = 'block';
                setTimeout(function() {
                    toast.style.opacity = '0';
                    toast.style.transition = '0.8s ease';
                    setTimeout(function() { toast.style.display = 'none'; }, 800);
                }, 4000);
            }
        </script>
    </main>
</body>
</html>
