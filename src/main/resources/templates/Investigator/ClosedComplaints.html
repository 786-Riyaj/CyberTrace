<html th:replace="~{Investigator/Investigatorbase::layout(~{::main})}">
<body>
    <main style="background-color: #020617; min-height: 100vh; padding: 25px;">
        
        <style>
            :root {
                --cyber-green: #22c55e;
                --cyber-blue: #3b82f6;
                --panel-bg: #0f172a;
                --text-bright: #ffffff;
                --text-dim: #cbd5e1;
                --border-line: rgba(34, 197, 94, 0.25);
            }

            /* --- SIDEBAR HIDE & SCROLLBAR FIX --- */
            body {
                overflow-x: hidden !important;
                width: 100%;
                position: relative;
            }

            .pc-sidebar, .pc-container, .pc-header {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .pc-sidebar-hide .pc-sidebar {
                transform: translateX(-100%);
                visibility: hidden;
                position: absolute;
            }

            .pc-sidebar-hide .pc-header, 
            .pc-sidebar-hide .pc-container {
                left: 0 !important;
                margin-left: 0 !important;
                width: 100% !important;
                min-width: 100% !important;
            }

            /* --- Panel & Table Design --- */
            .custom-panel {
                background: var(--panel-bg);
                border: 1px solid var(--border-line);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            }

            .panel-header {
                background: rgba(34, 197, 94, 0.1);
                border-bottom: 2px solid var(--cyber-green);
                padding: 15px 20px;
            }

            .panel-header h4 {
                color: var(--cyber-green);
                font-weight: 800;
                margin: 0;
                font-size: 1.1rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
            }

            .table-responsive {
                overflow-x: auto;
                max-width: 100%;
                scrollbar-width: thin;
                scrollbar-color: var(--cyber-green) var(--panel-bg);
            }

            .custom-table { width: 100%; border-collapse: collapse; }
            
            .custom-table thead th {
                background: #1e293b;
                color: var(--cyber-green);
                padding: 12px;
                font-weight: 800;
                font-size: 0.8rem;
                text-align: center;
                text-transform: uppercase;
                border: none;
                white-space: nowrap;
            }

            .custom-table td {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding: 12px;
                vertical-align: middle;
                text-align: center;
                color: var(--text-dim);
                font-size: 0.85rem;
            }

            .custom-table tr:hover {
                background: rgba(255, 255, 255, 0.02);
            }

            /* --- UI Components --- */
            .text-white-sharp { color: var(--text-bright) !important; font-weight: 600; }
            .text-danger-scam { color: #ef4444 !important; font-weight: 700; }

            .badge-status {
                background: rgba(34, 197, 94, 0.1);
                color: var(--cyber-green);
                border: 1px solid var(--cyber-green);
                padding: 4px 12px;
                font-size: 0.75rem;
                font-weight: 600;
            }

            .btn-view-ev {
                border: 1px solid var(--cyber-blue);
                color: var(--cyber-blue);
                background: transparent;
                font-size: 0.75rem;
                font-weight: 700;
                padding: 5px 12px;
                text-transform: uppercase;
            }
            .btn-view-ev:hover { background: var(--cyber-blue); color: #fff; }

            /* --- Modals --- */
            .modal-content { background: var(--panel-bg); border: 1px solid var(--cyber-green); color: #fff; }
            .modal-header { border-bottom: 1px solid var(--border-line); }
        </style>

        <div class="row">
            <div class="col-sm-12">
                <div class="custom-panel shadow-lg">
                    <div class="panel-header text-center">
                        <h4><i class="fas fa-archive me-2"></i> Closed Complaints Archive</h4>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Sr. No.</th>
                                        <th>Complaint Id</th>
                                        <th>Victim Name</th>
                                        <th>Contact No.</th>
                                        <th>Scammer</th>
                                        <th>Title</th>
                                        <th>Type of Scam</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                        <th>Evidence</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="com, srno : ${complaints}">
                                        <td th:text="${srno.index+1}"></td>
                                        <td class="text-white-sharp" th:text="${com.complaintId}"></td>
                                        <td class="text-white-sharp" th:text="${com.name}"></td>
                                        <td th:text="${com.contactNo}"></td>
                                        <td class="text-danger-scam" th:text="${com.scammer}"></td>
                                        <td th:text="${com.title}"></td>
                                        <td th:text="${com.typeOfScam}"></td>
                                        <td>
                                            <span class="badge badge-status rounded-pill" th:text="${com.status}"></span>
                                        </td>
                                        <td th:text="${#temporals.format(com.regDateTime, 'dd-MM-yyyy hh:mm a')}"></td>
                                        <td>
                                            <button class="btn btn-view-ev" data-bs-toggle="modal" th:data-bs-target="${'#evidenceModal__' + com.id}">
                                                <i class="fas fa-eye me-1"></i> View
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:each="com : ${complaints}" class="modal fade" th:id="${'evidenceModal__' + com.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fs-6 text-info"><i class="fas fa-images me-2"></i> Case Evidence Gallery</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body bg-black">
                        <div class="row g-2">
                            <div class="col-sm-4" th:each="images : ${com.evidence}">
                                <img class="w-100 rounded border border-secondary" th:src="@{'/uploads/' + ${images}}" style="height: 150px; object-fit: cover;">
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(com.evidence)}" class="text-center p-4">
                            <p class="text-muted small">No evidence uploaded.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            var msg = "[[${msg}]]";
            if(msg != "" && msg != "null") alert(msg);
        </script>
    </main>
</body>
</html>
