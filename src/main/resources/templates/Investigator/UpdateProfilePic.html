 <html th:replace="~{Investigator/Investigatorbase::layout(~{::main})}">
<body>
    <main style="background-color: #020617; min-height: 100vh; padding: 40px 15px;">
        
        <style>
            :root {
                --cyber-green: #22c55e;
                --cyber-red: #ef4444;
                --panel-bg: #0f172a;
                --text-bright: #ffffff;
                --text-dim: #cbd5e1;
            }

            /* --- Cyber Card Design --- */
            .profile-card {
                background: var(--panel-bg);
                border: 1px solid rgba(34, 197, 94, 0.2);
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                max-width: 600px;
                margin: auto;
            }

            .card-accent-header {
                background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent);
                border-bottom: 1px solid rgba(34, 197, 94, 0.2);
                padding: 25px;
                text-align: center;
            }

            .card-accent-header h4 {
                color: var(--cyber-green);
                font-weight: 800;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 2px;
                font-size: 1.2rem;
            }

            /* --- Avatar Display --- */
            .avatar-img {
                width: 180px;
                height: 180px;
                object-fit: cover;
                border: 4px solid var(--cyber-green);
                padding: 5px;
                background: #020617;
                box-shadow: 0 0 25px rgba(34, 197, 94, 0.3);
            }

            /* --- Upload Box & Inputs --- */
            .upload-box {
                background: rgba(0, 0, 0, 0.3);
                padding: 30px;
                border-radius: 15px;
                border: 1px dashed #334155;
            }

            .cyber-file-input {
                background: #020617 !important;
                border: 1px solid #334155 !important;
                color: white !important;
                padding: 10px;
                margin-bottom: 25px;
                font-size: 0.9rem;
            }

            /* --- ACTION BUTTONS (Admin Style) --- */
            .btn-group-custom {
                display: flex;
                gap: 15px;
            }

            .btn-cyber {
                flex: 1; /* Dono buttons barabar size ke honge */
                font-weight: 800;
                padding: 12px 20px;
                border-radius: 8px;
                text-transform: uppercase;
                transition: all 0.3s ease;
                letter-spacing: 1px;
                border: none;
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }

            /* Upload Button - Solid Green */
            .btn-upload {
                background: var(--cyber-green);
                color: #020617 !important;
            }

            .btn-upload:hover {
                background: #4ade80;
                box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
                transform: translateY(-2px);
            }

            /* Cancel Button - Dark Slate with Red Hover */
            .btn-cancel {
                background: #1e293b;
                color: white !important;
                text-decoration: none;
                border: 1px solid #334155;
            }

            .btn-cancel:hover {
                background: var(--cyber-red);
                border-color: var(--cyber-red);
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
                transform: translateY(-2px);
            }

            /* --- Message Toast --- */
            #custom-toast {
                position: fixed;
                top: 85px;
                right: 20px;
                background: #0f172a;
                border-left: 5px solid var(--cyber-green);
                color: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 15px 45px rgba(0,0,0,0.8);
                display: none;
                z-index: 10000;
                width: 350px;
                animation: slideIn 0.5s ease-out;
            }
            @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        </style>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="profile-card">
                        
                        <div class="card-accent-header">
                            <h4><i class="ti ti-camera me-2"></i> Update Profile Picture</h4>
                        </div>

                        <div class="card-body p-4 p-md-5 text-center">
                            <div class="mb-4">
                                <img class="rounded-circle avatar-img" 
                                     th:src="${session.loggedInUser != null && session.loggedInUser.profilePic != null} ? 
                                              @{/Profile/{fileName}(fileName=${session.loggedInUser.profilePic})} : 
                                              @{../assets/images/user/avatar-2.jpg}" 
                                     alt="Current Profile">
                            </div>

                            <div class="upload-box">
                                <form th:action="@{/Investigator/UpdateProfilePic}" method="post" enctype="multipart/form-data">
                                    <label class="d-block text-start mb-2 fw-bold" style="color: var(--text-dim); font-size: 0.75rem;">SELECT NEW IMAGE FILE</label>
                                    <input type="file" name="profilePic" class="form-control cyber-file-input" required>
                                    
                                    <div class="btn-group-custom">
                                        <button type="submit" class="btn-cyber btn-upload">
                                            <i class="ti ti-upload me-2"></i> Upload Pic
                                        </button>
                                        <a th:href="@{/Investigator/ViewProfile}" class="btn-cyber btn-cancel">
                                            <i class="ti ti-x me-2"></i> Cancel
                                        </a>
                                    </div>
                                </form>
                            </div>
                            
                            <p class="mt-4 mb-0 small" style="color: #64748b;">
                                <i class="ti ti-info-circle me-1"></i> Max size 2MB (JPG, PNG)
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="custom-toast">
            <div class="d-flex align-items-start">
                <i class="ti ti-shield-check text-success fs-3 me-3"></i>
                <div style="flex: 1;">
                    <h6 class="m-0 fw-bold text-success">System Alert</h6>
                    <div id="toast-text" class="small mt-1" style="color: white; line-height: 1.4;"></div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            var msg = /*[[${msg}]]*/ "";
            if (msg && msg.trim() !== "" && msg !== "null") {
                var toast = document.getElementById('custom-toast');
                var toastText = document.getElementById('toast-text');
                toastText.innerText = msg;
                toast.style.display = 'block';
                setTimeout(function() {
                    toast.style.opacity = '0';
                    toast.style.transition = '0.8s ease';
                    setTimeout(function() { toast.style.display = 'none'; }, 800);
                }, 4000);
            }
        </script>
    </main>
</body>
</html>
