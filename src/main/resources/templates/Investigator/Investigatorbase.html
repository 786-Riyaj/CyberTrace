<!DOCTYPE html>
<html lang="en" th:fragment="layout(content)">
<head>
    <title>Investigator Console | CyberTrace</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="../assets/fonts/tabler-icons.min.css">
    <link rel="stylesheet" href="../assets/fonts/feather.css">
    <link rel="stylesheet" href="../assets/fonts/fontawesome.css">
    <link rel="stylesheet" href="../assets/css/style.css" id="main-style-link">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cyber-green: #22c55e;
            --panel-bg: #0f172a;
            --dark-bg: #020617;
            --text-bright: #ffffff;
            --text-sub: #cbd5e1;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--dark-bg) !important;
            font-family: 'Inter', sans-serif;
            color: var(--text-bright);
            overflow-x: hidden;
        }

        /* --- Sidebar Cyber Design --- */
        .pc-sidebar {
            background: var(--panel-bg) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease-in-out;
            width: var(--sidebar-width);
            z-index: 1030;
        }

        /* Sidebar Toggle Classes */
        .pc-sidebar.pc-sidebar-hide {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        .pc-container {
            transition: all 0.3s ease-in-out;
            margin-left: var(--sidebar-width);
            background-color: var(--dark-bg);
            padding-top: 30px;
            min-height: 100vh;
        }

        .pc-container.pc-sidebar-hide {
            margin-left: 0 !important;
        }

        .pc-navbar .pc-link {
            color: var(--text-sub) !important;
            font-weight: 500;
            transition: 0.3s;
        }

        .pc-navbar .pc-item.active > .pc-link, 
        .pc-navbar .pc-link:hover {
            color: var(--cyber-green) !important;
            background: rgba(34, 197, 94, 0.08) !important;
        }

        /* --- Header Cyber Design --- */
        .pc-header {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease-in-out;
            left: var(--sidebar-width);
        }

        .pc-header.pc-sidebar-hide {
            left: 0;
        }

        .pc-head-link {
            background: rgba(255, 255, 255, 0.03) !important;
            color: var(--text-bright) !important;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 1024px) {
            .pc-sidebar { left: calc(-1 * var(--sidebar-width)); margin-left: 0; }
            .pc-sidebar.mob-sidebar-active { left: 0; }
            .pc-container, .pc-header { margin-left: 0; left: 0; }
        }



        /* --- Footer --- */
        .pc-footer {
            background: var(--panel-bg) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease-in-out;
            margin-left: var(--sidebar-width);
        }
        .pc-footer.pc-sidebar-hide { margin-left: 0; }
    </style>
</head>

<body data-pc-theme="dark">
    <div class="loader-bg">
        <div class="loader-track"><div class="loader-fill" style="background: var(--cyber-green);"></div></div>
    </div>

    <nav class="pc-sidebar" id="pc-sidebar">
        <div class="navbar-wrapper">
            <div class="m-header d-flex justify-content-center">
                 <a href="Dashboard" class="b-brand">
                    <h3 class="fw-bold mt-3 text-white">
                    <i class="fas fa-shield-halved me-2"
							style="color: var( --cyber-green);"></i> CYBER<span style="color: var(--cyber-green);">TRACE</span></h3>
                </a> 
                
            </div>
            <div class="navbar-content">
                <ul class="pc-navbar">
                    <li class="pc-item">
                        <a href="Dashboard" class="pc-link">
                            <span class="pc-micon"><i class="ti ti-dashboard"></i></span>
                            <span class="pc-mtext">Dashboard</span>
                        </a>
                    </li>
                    <li class="pc-item pc-caption">
                        <label style="color: var(--cyber-green); font-size: 0.7rem; letter-spacing: 1px;">INVESTIGATION</label>
                    </li>
                    <li class="pc-item"><a href="AssignedComplaints" class="pc-link"><span class="pc-micon"><i class="ti ti-folders"></i></span><span class="pc-mtext">Assigned Cases</span></a></li>
                    <li class="pc-item"><a href="ClosedComplaints" class="pc-link"><span class="pc-micon"><i class="ti ti-circle-check"></i></span><span class="pc-mtext">Closed Files</span></a></li>
                    <li class="pc-item"><a href="RejectedComplaints" class="pc-link"><span class="pc-micon"><i class="ti ti-circle-x"></i></span><span class="pc-mtext">Rejected Archive</span></a></li>
                    <li class="pc-item pc-caption"><label style="color: var(--cyber-green); font-size: 0.7rem;">ACCOUNT</label></li>
                    <li class="pc-item"><a href="ViewProfile" class="pc-link"><span class="pc-micon"><i class="ti ti-user-circle"></i></span><span class="pc-mtext">Identity Profile</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="pc-header" id="pc-header">
        <div class="header-wrapper">
            <div class="me-auto pc-mob-drp">
                <ul class="list-unstyled">
                    <li class="pc-h-item">
                        <a href="javascript:void(0);" class="pc-head-link ms-0 " id="sidebar-hide-btn">
                            <i class="ti ti-menu-2 text-white fs-4"></i>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="ms-auto">
                <ul class="list-unstyled">
                    <li class="dropdown pc-h-item header-user-profile">
                        <a class="pc-head-link dropdown-toggle arrow-none me-0 border-0" data-bs-toggle="dropdown" href="#">
                            <img th:src="${session.loggedInUser.profilePic != null ? '/Profile/' + session.loggedInUser.profilePic : '../assets/images/user/avatar-2.jpg'}"
                                class="user-avatar rounded-circle border border-success" style="height: 35px; width: 35px; object-fit: cover;">
                            <span class="ms-2 fw-bold text-white d-none d-sm-inline-block" th:text="${session.loggedInUser.name}">Investigator</span>
                        </a>
                        <div class="dropdown-menu dropdown-user-profile dropdown-menu-end pc-h-dropdown" style="background: var(--panel-bg); border: 1px solid var(--cyber-green);">
                            <a href="Logout" class="dropdown-item text-danger fw-bold"><i class="ti ti-power"></i> Logout</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <div class="pc-container" id="pc-container">
        <div class="pc-content">
            <div th:replace="${content}"></div>
        </div>
    </div>

    <footer class="pc-footer" id="pc-footer">
        <div class="footer-wrapper container-fluid">
            <div class="row">
                <div class="col-sm my-1"><p class="m-0 text-white-50">&copy; 2026 <span class="text-success fw-bold">CyberTrace</span> Secure Hub.</p></div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="../assets/js/plugins/popper.min.js"></script>
    <script src="../assets/js/plugins/bootstrap.min.js"></script>
    <script src="../assets/js/pcoded.js"></script>

    <script>
        $(document).ready(function() {
            // Sidebar Toggle Logic
            $('#sidebar-hide-btn').on('click', function() {
                if ($(window).width() > 1024) {
                    // Desktop Toggle
                    $('#pc-sidebar').toggleClass('pc-sidebar-hide');
                    $('#pc-container').toggleClass('pc-sidebar-hide');
                    $('#pc-header').toggleClass('pc-sidebar-hide');
                    $('#pc-footer').toggleClass('pc-sidebar-hide');
                } else {
                    // Mobile Toggle
                    $('#pc-sidebar').toggleClass('mob-sidebar-active');
                }
            });

            // Close sidebar on mobile when clicking outside or on a link
            $(document).on('click', function(event) {
                if ($(window).width() <= 1024) {
                    if (!$(event.target).closest('#pc-sidebar, #sidebar-hide-btn').length) {
                        $('#pc-sidebar').removeClass('mob-sidebar-active');
                    }
                }
            });
        });
    </script>
</body>
</html>
