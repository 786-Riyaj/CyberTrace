<html th:replace="~{base::layout(~{::main})}">
<body>
	<main style="background-color:#020617; min-height:100vh; padding-top:40px;">

		<style>


.custom-card {
	background-color: #0f172a;
	border: 1px solid rgba(34, 197, 94, 0.2);
	border-radius: 16px;
	overflow: hidden;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.custom-card-header {
	background-color: rgba(34, 197, 94, 0.1);
	border-bottom: 1px solid rgba(34, 197, 94, 0.2);
	padding: 20px;
}

.custom-card-header h4 {
	color: #22c55e;
	font-weight: 800;
	margin: 0;
	text-transform: uppercase;
	letter-spacing: 1px;
}

.label-text {
	color: #e5e7eb;
	font-weight: 600;
	margin-bottom: 10px;
	display: block;
}

.custom-input {
	background-color: #020617;
	border: 1px solid #94a3b8;
	color: #e5e7eb !important;
	border-radius: 8px;
	padding: 12px;
	transition: 0.3s;
}

.custom-input:focus {
	border-color: #22c55e;
	box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
	background-color: #020617;
}

.btn-green {
	background-color: #22c55e;
	color: #020617 !important;
	font-weight: 700;
	border-radius: 8px;
	padding: 12px;
	border: none;
	transition: 0.3s;
	width: 100%;
}

.btn-green:hover {
	background-color: #4ade80;
	transform: translateY(-2px);
	box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
}

.table-container {
	background-color: #0f172a;
	border-radius: 12px;
	border: 1px solid rgba(148, 163, 184, 0.2);
	margin-top: 40px;
	padding: 10px;
}

.custom-table {
	color: #e5e7eb !important;
	margin-bottom: 0;
}

.custom-table thead th {
	color: #94a3b8;
	border-bottom: 2px solid #22c55e;
	padding: 15px;
	font-size: 0.85rem;
	text-transform: uppercase;
}

.custom-table tbody td {
	padding: 15px;
	border-bottom: 1px solid rgba(148, 163, 184, 0.1);
	font-size: 0.95rem;
}

.status-badge {
	color: #22c55e;
	font-weight: 800;
	padding: 4px 10px;
	background: rgba(34, 197, 94, 0.1);
	border-radius: 6px;
	border: 1px solid rgba(34, 197, 94, 0.3);
}
		</style>

		<div class="container ">
			<div class="row">
				<div class="col-md-6 mx-auto mt-4">

				
					<div th:if="${msg != null}"
						class="text-center "
						style="background-color: rgba(34,197,94,0.1);
							   color:#22c55e;
							   border:1px solid rgba(34,197,94,0.3);
							   padding:12px;
							   border-radius:8px;
							   font-weight:600;">
						<i class="fas fa-info-circle me-2"></i>
						<span th:text="${msg}"></span>
					</div>

					<div class="custom-card shadow">
						<div class="custom-card-header">
							<h4 class="text-center">Track Your Complaint</h4>
						</div>

						<div class="card-body p-4">
							<form th:action="@{/TrackComplaint}" method="post">
								<div class="mb-3">
									<label class="label-text">Complaint ID</label>
									<input type="text"
										   placeholder="Ex : CT123654789"
										   name="cid"
										   class="form-control custom-input"
										   required>
								</div>

								<button type="submit" class="btn-green mt-2">
									<i class="fas fa-search-location me-2"></i> TRACK NOW
								</button>
							</form>
						</div>
					</div>

				</div>
			</div>

			
			<div class="row" th:if="${complaint != null}">
				<div class="col-md-12 mt-5">
					<div class="table-container shadow">
						<div class="p-3 border-bottom border-secondary">
							<h5 style="color:#22c55e;" class="fw-bold">
								<i class="fas fa-file-alt me-2"></i> Case Information
							</h5>
						</div>

						<div class="table-responsive">
							<table class="table custom-table">
								<thead>
									<tr>
							<th>Complaint Id</th>
							<th>Investigator</th>
							<th>Investigator Contact</th>
							<th>Complaint Title</th>
							<th>Registered Timing</th>
							<th>Resolved Timing</th>
							<th>Complaint Status</th>
						</tr>
								</thead>
								<tbody>
									<tr>
							<td th:text="${complaint.complaintId}"></td>
							<td
								th:text="${complaint.assignedTo!=null  ? complaint.assignedTo.name :'NA'}"></td>
							<td
								th:text="${complaint.assignedTo!=null ? complaint.assignedTo.contactNo :'NA'}"></td>
							<td th:text="${complaint.title}"></td>
							<td th:text="${complaint.regDateTime}"></td>
							<td	th:text="${complaint.solvedAt != null ? complaint.solvedAt :'NA'}"></td>
							<td th:text="${complaint.status}" class="text-success fw-bold"></td>
						</tr>
								</tbody>
							</table>
						</div>

					</div>
				</div>
			</div>

		</div>

	</main>
</body>
</html>
